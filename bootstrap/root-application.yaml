apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: klaforge
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/KLAForge/klaforge-gitops.git
    targetRevision: main
    path: clusters/production

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true