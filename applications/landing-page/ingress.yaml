apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: klaforge-landing-page
  namespace: klaforge
  labels:
    app.kubernetes.io/name: klaforge-landing-page
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: klaforge
    app.kubernetes.io/managed-by: argocd
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik

  rules:
    - host: klaforge.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: klaforge-landing-page
                port:
                  name: http

  tls:
    - hosts:
        - klaforge.dev
      secretName: klaforge-dev-tls
