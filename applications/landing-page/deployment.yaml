apiVersion: apps/v1
kind: Deployment
metadata:
  name: klaforge-landing-page
  namespace: klaforge
  labels:
    app.kubernetes.io/name: klaforge-landing-page
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: klaforge
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: klaforge-landing-page

  template:
    metadata:
      labels:
        app.kubernetes.io/name: klaforge-landing-page
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: klaforge

    spec:
      automountServiceAccountToken: false

      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:1.29.4-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 8080
              protocol: TCP

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10

          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
              readOnly: true

            - name: nginx-cache
              mountPath: /var/cache/nginx

            - name: nginx-run
              mountPath: /var/run

            - name: nginx-tmp
              mountPath: /tmp

      volumes:
        - name: html
          configMap:
            name: klaforge-landing-page

        - name: nginx-cache
          emptyDir: {}

        - name: nginx-run
          emptyDir: {}

        - name: nginx-tmp
          emptyDir: {}
