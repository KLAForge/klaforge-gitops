apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-web
  namespace: test
  labels:
    app.kubernetes.io/name: test-web
    app.kubernetes.io/part-of: klaforge
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: test-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: test-web
    spec:
      containers:
        - name: nginx
          image: nginx:1.29-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
