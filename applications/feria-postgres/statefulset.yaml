apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: feria-postgres
  namespace: feria
  labels:
    app.kubernetes.io/name: feria-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: klaforge

spec:
  serviceName: feria-postgres
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: feria-postgres

  template:
    metadata:
      labels:
        app.kubernetes.io/name: feria-postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: klaforge

    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: feria-postgres
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: feria-postgres
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: feria-postgres
                  key: POSTGRES_PASSWORD

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6

          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          app.kubernetes.io/name: feria-postgres
          app.kubernetes.io/part-of: klaforge

      spec:
        accessModes:
          - ReadWriteOnce

        resources:
          requests:
            storage: 2Gi