apiVersion: v1
kind: Service
metadata:
  name: feria-postgres
  namespace: feria
  labels:
    app.kubernetes.io/name: feria-postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: klaforge
spec:
  type: ClusterIP
  clusterIP: None

  selector:
    app.kubernetes.io/name: feria-postgres

  ports:
    - name: postgresql
      port: 5432
      targetPort: postgresql
      protocol: TCP