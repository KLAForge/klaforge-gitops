apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: klaforge-argocd-ingress
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-ingress
    app.kubernetes.io/component: infrastructure
    app.kubernetes.io/part-of: klaforge
spec:
  project: default

  source:
    repoURL: https://github.com/KLAForge/klaforge-gitops.git
    targetRevision: main
    path: infrastructure/argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true