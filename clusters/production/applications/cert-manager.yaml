apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: klaforge-cert-manager
  namespace: argocd

spec:
  project: default

  source:
    repoURL: oci://quay.io/jetstack/charts
    chart: cert-manager
    targetRevision: v1.21.0

    helm:
      releaseName: cert-manager
      values: |
        crds:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
