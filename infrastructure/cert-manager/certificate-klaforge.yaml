apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: klaforge-dev
  namespace: klaforge
  labels:
    app.kubernetes.io/name: klaforge
    app.kubernetes.io/component: certificate
    app.kubernetes.io/part-of: klaforge
    app.kubernetes.io/managed-by: argocd
spec:
  secretName: klaforge-dev-tls

  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer

  dnsNames:
    - klaforge.dev
    - www.klaforge.dev
